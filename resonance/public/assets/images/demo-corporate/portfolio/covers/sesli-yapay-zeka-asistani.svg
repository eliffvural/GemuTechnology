  <rect width="1320" height="760" fill="url(#bg-sesli-yapay-zeka-asistani)"/>
  <rect width="1320" height="760" fill="url(#orb1-sesli-yapay-zeka-asistani)"/>
  <rect width="1320" height="760" fill="url(#orb2-sesli-yapay-zeka-asistani)"/>

  <ellipse cx="1080" cy="140" rx="220" ry="180" fill="#fda4af" opacity="0.12" filter="url(#blur-sesli-yapay-zeka-asistani)"/>
  <ellipse cx="200" cy="620" rx="260" ry="200" fill="#fb7185" opacity="0.1" filter="url(#blur-sesli-yapay-zeka-asistani)"/>

  <rect x="0" y="0" width="1320" height="760" fill="url(#shine-sesli-yapay-zeka-asistani)" transform="rotate(-8 660 380)"/>

  <rect x="90" y="90" width="180" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="180" y="117" text-anchor="middle" fill="#ffffff" font-size="15" font-family="system-ui,-apple-system,sans-serif" font-weight="600" letter-spacing="0.06em">SESLI AI</text>

  <text x="90" y="320" fill="#ffffff" font-size="52" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.02em">
