<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-label="Sesli Yapay Zeka Asistanı">
  <defs>
    <linearGradient id="bg-sesli-yapay-zeka-asistani" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1d2e"/>
      <stop offset="100%" stop-color="#8b3a52"/>
    </linearGradient>
    <radialGradient id="orb1-sesli-yapay-zeka-asistani" cx="80%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#fda4af" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2-sesli-yapay-zeka-asistani" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.2"/>
