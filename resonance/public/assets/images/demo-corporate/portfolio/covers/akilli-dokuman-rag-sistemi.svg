  <rect x="90" y="500" width="280" height="110" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="120" y="555" fill="#fde68a" font-size="42" font-family="system-ui,-apple-system,sans-serif" font-weight="700">4x</text>
  <text x="120" y="590" fill="rgba(255,255,255,0.75)" font-size="16" font-family="system-ui,-apple-system,sans-serif">daha hızlı erişim</text>

  <circle cx="1150" cy="580" r="90" fill="none" stroke="#fde68a" stroke-width="2" opacity="0.35"/>
