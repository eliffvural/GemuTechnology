  <rect width="1320" height="760" fill="url(#bg-akilli-dokuman-rag-sistemi)"/>
  <rect width="1320" height="760" fill="url(#orb1-akilli-dokuman-rag-sistemi)"/>
  <rect width="1320" height="760" fill="url(#orb2-akilli-dokuman-rag-sistemi)"/>

