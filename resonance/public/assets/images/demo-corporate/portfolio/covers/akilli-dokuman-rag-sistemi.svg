  <ellipse cx="200" cy="620" rx="260" ry="200" fill="#fbbf24" opacity="0.1" filter="url(#blur-akilli-dokuman-rag-sistemi)"/>

  <rect x="0" y="0" width="1320" height="760" fill="url(#shine-akilli-dokuman-rag-sistemi)" transform="rotate(-8 660 380)"/>

  <rect x="90" y="90" width="180" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
